# PUBLIC REPRODUCE CONFIG: Flash Attention 2 Eval Packing Issue
base_model: google/gemma-3-1b-it  # Changed to Public HuggingFace path

# gemma3 specific ddp/memory handling
ddp_find_unused_parameters: true
experimental_skip_move_to_device: true 

# Optimization Plugins
plugins:
  - axolotl.integrations.cut_cross_entropy.CutCrossEntropyPlugin
  - axolotl.integrations.liger.LigerPlugin
liger_rope: true
liger_rms_norm: true
liger_glu_activation: true
liger_layer_norm: true
liger_fused_linear_cross_entropy: true

# Template & Tokens
chat_template: gemma3
eot_tokens:
  - "<end_of_turn>"

# Dataset - Swapped to public HuggingFace version of Dolly
datasets:
  - path: databricks/databricks-dolly-15k
    type: chat_template
    chat_template: gemma3
    field_messages: messages 

# --- THE CORE ISSUE SETTINGS ---
sequence_len: 8192
sample_packing: true
eval_sample_packing: false  # Trigger: set to false while sample_packing is true
flash_attention: true       # Requirement for the FA2 kernel issue
# -------------------------------

use_kernels: true
micro_batch_size: 2
gradient_accumulation_steps: 1
num_epochs: 1 # Set to 1 for faster reproduction
optimizer: adamw_torch_fused
learning_rate: 2e-4
lr_scheduler: cosine

bf16: true
tf32: true
logging_steps: 1
gradient_checkpointing: true

val_set_size: 0.1
evals_per_epoch: 5 # Frequent evals to catch the loss spike early
save_strategy: 'no'
